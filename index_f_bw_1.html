<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artists</title>
  <style>
    @font-face {
      font-family: 'ABCPerm';
      src: local('ABC P3rman3nt Unlicens'),
           local('ABCPermanentUnlicens'),
           local('ABC Permanent Unlicens');
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
    }

    /* ── Snap scroll container ── */
    .scroll-container {
      width: 100%;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* ── Individual artist slides ── */
    .slide {
      height: clamp(70px, 10vw, 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
    }

    /* Padding slides so first/last name can reach center */
    .slide-spacer {
      height: 50vh;
      scroll-snap-align: none;
    }

    .artist-name {
      font-family: 'ABCPerm', 'Arial Black', Helvetica, sans-serif;
      font-weight: 900;
      font-size: clamp(72px, 14vw, 220px);
      color: #000;
      white-space: nowrap;
      line-height: 1;
      /* Vertical compression */
      transform: scaleY(0.58);
      transform-origin: center center;
      display: block;
      /* Soft contour / outline */
      text-shadow:
        0   0   6px rgba(0,0,0,0.55),
        1px 2px 6px rgba(0,0,0,0.30),
       -1px 2px 6px rgba(0,0,0,0.30);
      -webkit-text-stroke: 0.5px rgba(0,0,0,0.4);
    }

    /* ── Fixed grey oval overlay ── */
    .brush {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-0.6deg);
      width: 100vw;
      height: 500px;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: difference;
      background: radial-gradient(ellipse 50% 45% at 50% 50%, rgba(158,158,158,1) 0%, rgba(150,150,150,0.5) 50%, transparent 100%);
    }
  </style>
</head>
<body>

  <div class="scroll-container">
    <div class="slide-spacer"></div>
    <div class="slide"><span class="artist-name">Anu Cato</span></div>
    <div class="slide"><span class="artist-name">djadjamai</span></div>
    <div class="slide"><span class="artist-name">FUMU</span></div>
    <div class="slide"><span class="artist-name">Isi!</span></div>
    <div class="slide"><span class="artist-name">GAto</span></div>
    <div class="slide"><span class="artist-name">NaKo</span></div>
    <div class="slide"><span class="artist-name">YSEI</span></div>
    <div class="slide"><span class="artist-name">Lumi.B</span></div>
    <div class="slide"><span class="artist-name">dAko</span></div>
    <div class="slide"><span class="artist-name">PRXMX</span></div>
    <div class="slide"><span class="artist-name">Safi!</span></div>
    <div class="slide"><span class="artist-name">CXLOE</span></div>
    <div class="slide"><span class="artist-name">Nneka</span></div>
    <div class="slide"><span class="artist-name">fLo</span></div>
    <div class="slide"><span class="artist-name">XANA</span></div>
    <div class="slide"><span class="artist-name">Pelo</span></div>
    <div class="slide"><span class="artist-name">DMBA</span></div>
    <div class="slide"><span class="artist-name">Yosa!</span></div>
    <div class="slide"><span class="artist-name">KXNG</span></div>
    <div class="slide"><span class="artist-name">Boé</span></div>
    <div class="slide"><span class="artist-name">Temi!</span></div>
    <div class="slide"><span class="artist-name">AxMo</span></div>
    <div class="slide"><span class="artist-name">VVNDR</span></div>
    <div class="slide"><span class="artist-name">Jace.B</span></div>
    <div class="slide"><span class="artist-name">KYMA</span></div>
    <div class="slide"><span class="artist-name">Prxz</span></div>
    <div class="slide"><span class="artist-name">OwuSu</span></div>
    <div class="slide"><span class="artist-name">SLWMO</span></div>
    <div class="slide"><span class="artist-name">Rexx!</span></div>
    <div class="slide"><span class="artist-name">BuJu</span></div>
    <div class="slide-spacer"></div>
  </div>

  <!-- Fixed grey brush stroke – mix-blend-mode: difference -->
  <div class="brush"></div>

  <script>
    const container = document.querySelector('.scroll-container');
    const slides    = Array.from(document.querySelectorAll('.slide'));

    function update() {
      const vh = container.clientHeight;
      const centerY = vh / 2;

      slides.forEach((slide, i) => {
        const rect      = slide.getBoundingClientRect();
        const slideCenter = rect.top + rect.height / 2;
        const dist      = slideCenter - centerY;          // px from viewport center
        const t         = Math.min(Math.abs(dist) / (vh * 0.5), 1); // 0 = center, 1 = edge
        const eased     = t * t;                           // ease-in curve → more dramatic far away
        const direction = i % 2 === 0 ? 1 : -1;
        const angle     = eased * 42 * direction;          // max ~42° at edge

        slide.style.transform = `perspective(700px) rotateY(${angle}deg)`;
      });
    }

    container.addEventListener('scroll', () => requestAnimationFrame(update), { passive: true });
    update();
  </script>

</body>
</html>
