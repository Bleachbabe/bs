
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artists</title>
  <style>
    @font-face {
      font-family: 'ABCPerm';
      src: local('ABC P3rman3nt Unlicens'),
           local('ABCPermanentUnlicens'),
           local('ABC Permanent Unlicens');
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
    }

    /* ── Snap scroll container ── */
    .scroll-container {
      width: 100%;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* ── Individual artist slides ── */
    .slide {
      height: clamp(70px, 10vw, 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
    }

    /* Padding slides so first/last name can reach center */
    .slide-spacer {
      height: 50vh;
      scroll-snap-align: none;
    }

    .artist-name {
      font-family: 'ABCPerm', 'Arial Black', Helvetica, sans-serif;
      font-weight: 900;
      font-size: clamp(72px, 14vw, 220px);
      color: #000;
      white-space: nowrap;
      line-height: 1;
      /* Vertical compression */
      transform: scaleY(0.58);
      transform-origin: center center;
      display: block;
      /* Soft contour / outline */
      text-shadow:
        0   0   6px rgba(0,0,0,0.55),
        1px 2px 6px rgba(0,0,0,0.30),
       -1px 2px 6px rgba(0,0,0,0.30);
      -webkit-text-stroke: 0.5px rgba(0,0,0,0.4);
    }

    /* ── Fixed grey oval overlay ── */
    .brush {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: difference;
      background: linear-gradient(to bottom, #fff 0%, #313131 25%, #ffddee 50%, #313131 75%, #fff 100%);
    }

    /* Ensure scroll container and slides sit above bg */
    .scroll-container { position: relative; z-index: 1; }
  </style>
</head>
<body>

  <div class="scroll-container">
    <div class="slide-spacer"></div>
    <div class="slide" data-img="1"><span class="artist-name">Anu Cato</span></div>
    <div class="slide" data-img="2"><span class="artist-name">djadjamai</span></div>
    <div class="slide" data-img="3"><span class="artist-name">FUMU</span></div>
    <div class="slide" data-img="4"><span class="artist-name">Isi!</span></div>
    <div class="slide" data-img="5"><span class="artist-name">GAto</span></div>
    <div class="slide" data-img="6"><span class="artist-name">NaKo</span></div>
    <div class="slide" data-img="7"><span class="artist-name">YSEI</span></div>
    <div class="slide" data-img="8"><span class="artist-name">Lumi.B</span></div>
    <div class="slide" data-img="9"><span class="artist-name">dAko</span></div>
    <div class="slide" data-img="10"><span class="artist-name">PRXMX</span></div>
    <div class="slide" data-img="11"><span class="artist-name">Safi!</span></div>
    <div class="slide" data-img="12"><span class="artist-name">CXLOE</span></div>
    <div class="slide" data-img="13"><span class="artist-name">Nneka</span></div>
    <div class="slide" data-img="14"><span class="artist-name">fLo</span></div>
    <div class="slide" data-img="15"><span class="artist-name">XANA</span></div>
    <div class="slide" data-img="16"><span class="artist-name">Pelo</span></div>
    <div class="slide" data-img="1"><span class="artist-name">DMBA</span></div>
    <div class="slide" data-img="2"><span class="artist-name">Yosa!</span></div>
    <div class="slide" data-img="3"><span class="artist-name">KXNG</span></div>
    <div class="slide" data-img="4"><span class="artist-name">Boé</span></div>
    <div class="slide" data-img="5"><span class="artist-name">Temi!</span></div>
    <div class="slide" data-img="6"><span class="artist-name">AxMo</span></div>
    <div class="slide" data-img="7"><span class="artist-name">VVNDR</span></div>
    <div class="slide" data-img="8"><span class="artist-name">Jace.B</span></div>
    <div class="slide" data-img="9"><span class="artist-name">KYMA</span></div>
    <div class="slide" data-img="10"><span class="artist-name">Prxz</span></div>
    <div class="slide" data-img="11"><span class="artist-name">OwuSu</span></div>
    <div class="slide" data-img="12"><span class="artist-name">SLWMO</span></div>
    <div class="slide" data-img="13"><span class="artist-name">Rexx!</span></div>
    <div class="slide" data-img="14"><span class="artist-name">BuJu</span></div>
    <div class="slide-spacer"></div>
  </div>

  <!-- Fixed grey brush stroke – mix-blend-mode: difference -->
  <div class="brush"></div>

  <script>
    const container = document.querySelector('.scroll-container');
    const slides    = Array.from(document.querySelectorAll('.slide'));

    let currentImg  = null;

    // ── Scroll-scrubbed audio ─────────────────────────────────────────
    let audioCtx    = null;
    let gainNode    = null;
    let audioBuffer = null;
    let srcNode     = null;
    let playOffset  = 0;   // audio time we started from
    let playStartAt = 0;   // audioCtx.currentTime when playback began
    let isPlaying   = false;
    let stopTimer   = null;
    let audioReady  = false;

    async function loadAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0;
      gainNode.connect(audioCtx.destination);
      try {
        const res = await fetch('content/music.opus');
        const buf = await res.arrayBuffer();
        audioBuffer = await audioCtx.decodeAudioData(buf);
        audioReady = true;
      } catch(e) { console.warn('Audio load failed:', e); }
    }

    function currentAudioPos() {
      if (!isPlaying) return playOffset;
      return playOffset + (audioCtx.currentTime - playStartAt);
    }

    function startFrom(time) {
      if (srcNode) {
        try { srcNode.stop(); } catch(e) {}
        srcNode.disconnect();
      }
      const t = Math.max(0, Math.min(time, audioBuffer.duration - 0.05));
      srcNode = audioCtx.createBufferSource();
      srcNode.buffer = audioBuffer;
      srcNode.connect(gainNode);

      // Vinyl spin-up: pitch ramps from 0 → 1 over 0.3s
      srcNode.playbackRate.setValueAtTime(0.0, audioCtx.currentTime);
      srcNode.playbackRate.linearRampToValueAtTime(1.0, audioCtx.currentTime + 0.4);

      srcNode.start(0, t);
      gainNode.gain.setValueAtTime(0.9, audioCtx.currentTime);
      playOffset  = t;
      playStartAt = audioCtx.currentTime;
      isPlaying   = true;
    }

    function stopPlayback() {
      if (!isPlaying) return;
      playOffset = currentAudioPos();
      isPlaying  = false;
      const t = audioCtx.currentTime;

      // Vinyl slow-down: pitch ramps from current → 0 over 0.35s
      srcNode.playbackRate.cancelScheduledValues(t);
      srcNode.playbackRate.setValueAtTime(srcNode.playbackRate.value, t);
      srcNode.playbackRate.linearRampToValueAtTime(0.0, t + 0.4);

      const captured = srcNode;
      setTimeout(() => {
        try { captured.stop(); } catch(e) {}
        captured.disconnect();
        if (srcNode === captured) srcNode = null;
      }, 380);
    }

    function getTargetTime() {
      const maxScroll = container.scrollHeight - container.clientHeight;
      const ratio = maxScroll > 0 ? container.scrollTop / maxScroll : 0;
      return ratio * audioBuffer.duration;
    }

    function onScrollAudio() {
      if (!audioReady) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const target  = getTargetTime();
      const current = currentAudioPos();

      // Restart if drift > 0.4s (scroll jumped) or not playing
      if (!isPlaying || Math.abs(current - target) > 0.4) {
        startFrom(target);
      }

      // Stop after scrolling settles
      clearTimeout(stopTimer);
      stopTimer = setTimeout(stopPlayback, 180);
    }

    // Load audio immediately; playback needs a user gesture
    loadAudio();
    // ── End audio ────────────────────────────────────────────────────

    function setBackground(imgNum) {
      if (imgNum === currentImg) return;
      currentImg = imgNum;
    }

    function update() {
      const vh      = container.clientHeight;
      const centerY = vh / 2;
      let   closest = null;
      let   closestDist = Infinity;

      slides.forEach((slide, i) => {
        const rect        = slide.getBoundingClientRect();
        const slideCenter = rect.top + rect.height / 2;
        const dist        = slideCenter - centerY;
        const absDist     = Math.abs(dist);

        if (absDist < closestDist) {
          closestDist = absDist;
          closest     = slide;
        }

        const t         = Math.min(absDist / (vh * 0.5), 1);
        const eased     = t * t;
        const direction = i % 2 === 0 ? 1 : -1;
        const angle     = eased * 42 * direction;
        const scale     = 1 + eased * 1;

        slide.style.transform = `perspective(700px) rotateY(${angle}deg) scale(${scale})`;
      });

      if (closest) {
        setBackground(closest.dataset.img);
      }
    }

    container.addEventListener('scroll', () => { onScrollAudio(); requestAnimationFrame(update); }, { passive: true });
    update();
  </script>

</body>
</html>
