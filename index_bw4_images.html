<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artists</title>
  <style>
    @font-face {
      font-family: 'ABCPerm';
      src: local('ABC P3rman3nt Unlicens'),
           local('ABCPermanentUnlicens'),
           local('ABC Permanent Unlicens');
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
    }

    /* ── Snap scroll container ── */
    .scroll-container {
      width: 100%;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* ── Individual artist slides ── */
    .slide {
      height: clamp(70px, 10vw, 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
    }

    /* Padding slides so first/last name can reach center */
    .slide-spacer {
      height: 50vh;
      scroll-snap-align: none;
    }

    .artist-name {
      font-family: 'ABCPerm', 'Arial Black', Helvetica, sans-serif;
      font-weight: 900;
      font-size: clamp(72px, 14vw, 220px);
      color: #000;
      white-space: nowrap;
      line-height: 1;
      /* Vertical compression */
      transform: scaleY(0.58);
      transform-origin: center center;
      display: block;
      /* Soft contour / outline */
      text-shadow:
        0   0   6px rgba(0,0,0,0.55),
        1px 2px 6px rgba(0,0,0,0.30),
       -1px 2px 6px rgba(0,0,0,0.30);
      -webkit-text-stroke: 0.5px rgba(0,0,0,0.4);
    }

    /* ── Full-screen background image ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }
    .bg-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 0.4s ease;
    }

    /* ── Fixed grey oval overlay ── */
    .brush {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-0.6deg);
      width: 100vw;
      height: 500px;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: difference;
      background: radial-gradient(ellipse 50% 45% at 50% 50%, rgba(158,158,158,1) 0%, rgba(150,150,150,0.5) 50%, transparent 100%);
    }

    /* Ensure scroll container and slides sit above bg */
    .scroll-container { position: relative; z-index: 1; }
  </style>
</head>
<body>

  <div id="bg">
    <div class="bg-layer" id="bg-a"></div>
    <div class="bg-layer" id="bg-b" style="opacity:0"></div>
  </div>

  <div class="scroll-container">
    <div class="slide-spacer"></div>
    <div class="slide" data-img="1"><span class="artist-name">Anu Cato</span></div>
    <div class="slide" data-img="2"><span class="artist-name">djadjamai</span></div>
    <div class="slide" data-img="3"><span class="artist-name">FUMU</span></div>
    <div class="slide" data-img="4"><span class="artist-name">Isi!</span></div>
    <div class="slide" data-img="5"><span class="artist-name">GAto</span></div>
    <div class="slide" data-img="6"><span class="artist-name">NaKo</span></div>
    <div class="slide" data-img="7"><span class="artist-name">YSEI</span></div>
    <div class="slide" data-img="8"><span class="artist-name">Lumi.B</span></div>
    <div class="slide" data-img="9"><span class="artist-name">dAko</span></div>
    <div class="slide" data-img="10"><span class="artist-name">PRXMX</span></div>
    <div class="slide" data-img="11"><span class="artist-name">Safi!</span></div>
    <div class="slide" data-img="12"><span class="artist-name">CXLOE</span></div>
    <div class="slide" data-img="13"><span class="artist-name">Nneka</span></div>
    <div class="slide" data-img="14"><span class="artist-name">fLo</span></div>
    <div class="slide" data-img="15"><span class="artist-name">XANA</span></div>
    <div class="slide" data-img="16"><span class="artist-name">Pelo</span></div>
    <div class="slide" data-img="1"><span class="artist-name">DMBA</span></div>
    <div class="slide" data-img="2"><span class="artist-name">Yosa!</span></div>
    <div class="slide" data-img="3"><span class="artist-name">KXNG</span></div>
    <div class="slide" data-img="4"><span class="artist-name">Boé</span></div>
    <div class="slide" data-img="5"><span class="artist-name">Temi!</span></div>
    <div class="slide" data-img="6"><span class="artist-name">AxMo</span></div>
    <div class="slide" data-img="7"><span class="artist-name">VVNDR</span></div>
    <div class="slide" data-img="8"><span class="artist-name">Jace.B</span></div>
    <div class="slide" data-img="9"><span class="artist-name">KYMA</span></div>
    <div class="slide" data-img="10"><span class="artist-name">Prxz</span></div>
    <div class="slide" data-img="11"><span class="artist-name">OwuSu</span></div>
    <div class="slide" data-img="12"><span class="artist-name">SLWMO</span></div>
    <div class="slide" data-img="13"><span class="artist-name">Rexx!</span></div>
    <div class="slide" data-img="14"><span class="artist-name">BuJu</span></div>
    <div class="slide-spacer"></div>
  </div>

  <!-- Fixed grey brush stroke – mix-blend-mode: difference -->
  <div class="brush"></div>

  <script>
    const container = document.querySelector('.scroll-container');
    const slides    = Array.from(document.querySelectorAll('.slide'));
    const layerA    = document.getElementById('bg-a');
    const layerB    = document.getElementById('bg-b');

    let currentImg  = null;
    let front       = layerA;
    let back        = layerB;

    // ── Audio synthesis ──────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function noise(duration, filter = null, filterFreq = 2000, gain = 0.6) {
      const buf  = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const g = audioCtx.createGain();
      if (filter) {
        const f = audioCtx.createBiquadFilter();
        f.type = filter; f.frequency.value = filterFreq;
        src.connect(f); f.connect(g);
      } else {
        src.connect(g);
      }
      g.connect(audioCtx.destination);
      return { src, gain: g };
    }

    function osc(freq, type = 'sine') {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      o.connect(g); g.connect(audioCtx.destination);
      return { osc: o, gain: g };
    }

    function env(gainNode, peak, decay, t) {
      gainNode.gain.setValueAtTime(peak, t);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, t + decay);
    }

    const sounds = {
      1:  (t) => { // Snare A
            const { src, gain: g } = noise(0.2, 'bandpass', 800, 0.7);
            env(g, 0.7, 0.18, t); g.gain.setValueAtTime(0.7, t); src.start(t); src.stop(t + 0.2);
            const { osc: o, gain: og } = osc(200); env(og, 0.4, 0.08, t); o.start(t); o.stop(t + 0.1);
          },
      2:  (t) => { // Kick
            const { osc: o, gain: g } = osc(60);
            o.frequency.setValueAtTime(160, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
            env(g, 0.9, 0.3, t); o.start(t); o.stop(t + 0.35);
          },
      3:  (t) => { // Closed hi-hat
            const { src, gain: g } = noise(0.08, 'highpass', 8000, 0.4);
            env(g, 0.4, 0.05, t); g.gain.setValueAtTime(0.4, t); src.start(t); src.stop(t + 0.08);
          },
      4:  (t) => { // Clap
            [0, 0.01, 0.02].forEach(offset => {
              const { src, gain: g } = noise(0.07, 'bandpass', 1200, 0.5);
              g.gain.setValueAtTime(0.5, t + offset);
              g.gain.exponentialRampToValueAtTime(0.0001, t + offset + 0.06);
              src.start(t + offset); src.stop(t + offset + 0.07);
            });
          },
      5:  (t) => { // Tom high
            const { osc: o, gain: g } = osc(320);
            o.frequency.setValueAtTime(320, t); o.frequency.exponentialRampToValueAtTime(180, t + 0.15);
            env(g, 0.7, 0.2, t); o.start(t); o.stop(t + 0.25);
          },
      6:  (t) => { // Tom low
            const { osc: o, gain: g } = osc(100);
            o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(55, t + 0.2);
            env(g, 0.8, 0.3, t); o.start(t); o.stop(t + 0.35);
          },
      7:  (t) => { // Open hi-hat
            const { src, gain: g } = noise(0.4, 'highpass', 7000, 0.35);
            env(g, 0.35, 0.35, t); g.gain.setValueAtTime(0.35, t); src.start(t); src.stop(t + 0.4);
          },
      8:  (t) => { // Rim shot
            const { osc: o, gain: g } = osc(900, 'triangle');
            env(g, 0.6, 0.04, t); o.start(t); o.stop(t + 0.05);
            const { src, gain: ng } = noise(0.04, 'bandpass', 1800, 0.3);
            env(ng, 0.3, 0.03, t); ng.gain.setValueAtTime(0.3, t); src.start(t); src.stop(t + 0.04);
          },
      9:  (t) => { // 808 kick
            const { osc: o, gain: g } = osc(55);
            o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.15);
            env(g, 1.0, 0.6, t); o.start(t); o.stop(t + 0.7);
          },
      10: (t) => { // Cowbell
            [562, 845].forEach(freq => {
              const { osc: o, gain: g } = osc(freq, 'square');
              env(g, 0.25, 0.5, t); o.start(t); o.stop(t + 0.6);
            });
          },
      11: (t) => { // Crash
            const { src, gain: g } = noise(1.0, 'highpass', 5000, 0.3);
            g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
            src.start(t); src.stop(t + 1.0);
          },
      12: (t) => { // Clave
            const { osc: o, gain: g } = osc(1400, 'sine');
            env(g, 0.7, 0.025, t); o.start(t); o.stop(t + 0.03);
          },
      13: (t) => { // Snare B (deeper)
            const { src, gain: g } = noise(0.25, 'bandpass', 500, 0.6);
            env(g, 0.6, 0.22, t); g.gain.setValueAtTime(0.6, t); src.start(t); src.stop(t + 0.25);
            const { osc: o, gain: og } = osc(120); env(og, 0.5, 0.1, t); o.start(t); o.stop(t + 0.12);
          },
      14: (t) => { // Shaker
            const { src, gain: g } = noise(0.06, 'bandpass', 5000, 0.25);
            env(g, 0.25, 0.05, t); g.gain.setValueAtTime(0.25, t); src.start(t); src.stop(t + 0.06);
          },
      15: (t) => { // Synth perc
            const { osc: o, gain: g } = osc(440, 'triangle');
            o.frequency.setValueAtTime(660, t); o.frequency.exponentialRampToValueAtTime(220, t + 0.12);
            env(g, 0.6, 0.15, t); o.start(t); o.stop(t + 0.2);
          },
      16: (t) => { // Deep sub kick
            const { osc: o, gain: g } = osc(40);
            o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.2);
            env(g, 1.0, 0.5, t); o.start(t); o.stop(t + 0.55);
          },
    };

    function playSample(imgNum) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const fn = sounds[parseInt(imgNum)];
      if (fn) fn(audioCtx.currentTime);
    }

    // ── End audio ────────────────────────────────────────────────────

    function setBackground(imgNum) {
      if (imgNum === currentImg) return;
      currentImg = imgNum;

      back.style.backgroundImage = `url('content/${imgNum}.webp')`;
      back.style.opacity  = '1';
      front.style.opacity = '0';
      [front, back] = [back, front];

      playSample(imgNum);
    }

    function update() {
      const vh      = container.clientHeight;
      const centerY = vh / 2;
      let   closest = null;
      let   closestDist = Infinity;

      slides.forEach((slide, i) => {
        const rect        = slide.getBoundingClientRect();
        const slideCenter = rect.top + rect.height / 2;
        const dist        = slideCenter - centerY;
        const absDist     = Math.abs(dist);

        if (absDist < closestDist) {
          closestDist = absDist;
          closest     = slide;
        }

        const t         = Math.min(absDist / (vh * 0.5), 1);
        const eased     = t * t;
        const direction = i % 2 === 0 ? 1 : -1;
        const angle     = eased * 42 * direction;

        slide.style.transform = `perspective(700px) rotateY(${angle}deg)`;
      });

      if (closest) {
        setBackground(closest.dataset.img);
      }
    }

    // Set first image immediately
    layerA.style.backgroundImage = `url('content/${slides[0].dataset.img}.webp')`;
    currentImg = slides[0].dataset.img;

    container.addEventListener('scroll', () => requestAnimationFrame(update), { passive: true });
    update();
  </script>

</body>
</html>
