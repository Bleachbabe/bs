<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artists</title>
  <style>
    @font-face {
      font-family: 'ABCPerm';
      src: local('ABC P3rman3nt Unlicens'),
           local('ABCPermanentUnlicens'),
           local('ABC Permanent Unlicens');
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
    }

    /* ── Snap scroll container ── */
    .scroll-container {
      width: 100%;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* ── Individual artist slides ── */
    .slide {
      height: clamp(70px, 10vw, 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
    }

    /* Padding slides so first/last name can reach center */
    .slide-spacer {
      height: 50vh;
      scroll-snap-align: none;
    }

    .artist-name {
      font-family: 'ABCPerm', 'Arial Black', Helvetica, sans-serif;
      font-weight: 900;
      font-size: clamp(72px, 14vw, 220px);
      color: #000;
      white-space: nowrap;
      line-height: 1;
      /* Vertical compression */
      transform: scaleY(0.58);
      transform-origin: center center;
      display: block;
      /* Soft contour / outline */
      text-shadow:
        0   0   6px rgba(0,0,0,0.55),
        1px 2px 6px rgba(0,0,0,0.30),
       -1px 2px 6px rgba(0,0,0,0.30);
      -webkit-text-stroke: 0.5px rgba(0,0,0,0.4);
    }

    /* ── Fixed grey oval overlay ── */
    .brush {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: difference;
      background: linear-gradient(to bottom, #fff 0%, #000 25%, #ff69b4 50%, #000 75%, #fff 100%);
    }

    /* Ensure scroll container and slides sit above bg */
    .scroll-container { position: relative; z-index: 1; }

    /* ── Blur overlays top & bottom ── */
    .blur-top, .blur-bottom {
      position: fixed;
      left: 0;
      width: 100%;
      height: 50vh;
      pointer-events: none;
      z-index: 5;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .blur-top {
      top: 0;
      mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
    }
    .blur-bottom {
      bottom: 0;
      mask-image: linear-gradient(to top, black 0%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, black 0%, transparent 100%);
    }
  </style>
</head>
<body>

  <div class="scroll-container">
    <div class="slide-spacer"></div>
    <div class="slide" data-img="1"><span class="artist-name">Backslash</span></div>
    <div class="slide" data-img="2"><span class="artist-name">20.07.26</span></div>
    <div class="slide" data-img="3"><span class="artist-name">Gessneralle</span></div>
    <div class="slide" data-img="4"><span class="artist-name">luvy*</span></div>
    <div class="slide-spacer"></div>
  </div>

  <div class="blur-top"></div>
  <div class="blur-bottom"></div>

  <!-- Fixed grey brush stroke – mix-blend-mode: difference -->
  <div class="brush"></div>

  <script>
    // ── Fit each name to viewport width ──────────────────────────────
    function fitAllNames() {
      const names = document.querySelectorAll('.artist-name');
      let size = Math.min(220, window.innerWidth * 0.14);
      names.forEach(n => n.style.fontSize = size + 'px');
      // Shrink until the widest name fits
      while (size > 10 && Array.from(names).some(n => n.scrollWidth > window.innerWidth)) {
        size -= 1;
        names.forEach(n => n.style.fontSize = size + 'px');
      }
    }
    fitAllNames();
    window.addEventListener('resize', fitAllNames);

    const container = document.querySelector('.scroll-container');
    const slides    = Array.from(document.querySelectorAll('.slide'));

    let currentImg  = null;

    // ── Audio synthesis ──────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function noise(duration, filter = null, filterFreq = 2000, gain = 0.6) {
      const buf  = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const g = audioCtx.createGain();
      if (filter) {
        const f = audioCtx.createBiquadFilter();
        f.type = filter; f.frequency.value = filterFreq;
        src.connect(f); f.connect(g);
      } else {
        src.connect(g);
      }
      g.connect(audioCtx.destination);
      return { src, gain: g };
    }

    function osc(freq, type = 'sine') {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      o.connect(g); g.connect(audioCtx.destination);
      return { osc: o, gain: g };
    }

    function env(gainNode, peak, decay, t) {
      gainNode.gain.setValueAtTime(peak, t);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, t + decay);
    }

    const sounds = {
      1:  (t) => { // Snare A
            const { src, gain: g } = noise(0.2, 'bandpass', 800, 0.7);
            env(g, 0.7, 0.18, t); g.gain.setValueAtTime(0.7, t); src.start(t); src.stop(t + 0.2);
            const { osc: o, gain: og } = osc(200); env(og, 0.4, 0.08, t); o.start(t); o.stop(t + 0.1);
          },
      2:  (t) => { // Kick
            const { osc: o, gain: g } = osc(60);
            o.frequency.setValueAtTime(160, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
            env(g, 0.9, 0.3, t); o.start(t); o.stop(t + 0.35);
          },
      3:  (t) => { // Closed hi-hat
            const { src, gain: g } = noise(0.08, 'highpass', 8000, 0.4);
            env(g, 0.4, 0.05, t); g.gain.setValueAtTime(0.4, t); src.start(t); src.stop(t + 0.08);
          },
      4:  (t) => { // Clap
            [0, 0.01, 0.02].forEach(offset => {
              const { src, gain: g } = noise(0.07, 'bandpass', 1200, 0.5);
              g.gain.setValueAtTime(0.5, t + offset);
              g.gain.exponentialRampToValueAtTime(0.0001, t + offset + 0.06);
              src.start(t + offset); src.stop(t + offset + 0.07);
            });
          },
      5:  (t) => { // Tom high
            const { osc: o, gain: g } = osc(320);
            o.frequency.setValueAtTime(320, t); o.frequency.exponentialRampToValueAtTime(180, t + 0.15);
            env(g, 0.7, 0.2, t); o.start(t); o.stop(t + 0.25);
          },
      6:  (t) => { // Tom low
            const { osc: o, gain: g } = osc(100);
            o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(55, t + 0.2);
            env(g, 0.8, 0.3, t); o.start(t); o.stop(t + 0.35);
          },
      7:  (t) => { // Open hi-hat
            const { src, gain: g } = noise(0.4, 'highpass', 7000, 0.35);
            env(g, 0.35, 0.35, t); g.gain.setValueAtTime(0.35, t); src.start(t); src.stop(t + 0.4);
          },
      8:  (t) => { // Rim shot
            const { osc: o, gain: g } = osc(900, 'triangle');
            env(g, 0.6, 0.04, t); o.start(t); o.stop(t + 0.05);
            const { src, gain: ng } = noise(0.04, 'bandpass', 1800, 0.3);
            env(ng, 0.3, 0.03, t); ng.gain.setValueAtTime(0.3, t); src.start(t); src.stop(t + 0.04);
          },
      9:  (t) => { // 808 kick
            const { osc: o, gain: g } = osc(55);
            o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.15);
            env(g, 1.0, 0.6, t); o.start(t); o.stop(t + 0.7);
          },
      10: (t) => { // Cowbell
            [562, 845].forEach(freq => {
              const { osc: o, gain: g } = osc(freq, 'square');
              env(g, 0.25, 0.5, t); o.start(t); o.stop(t + 0.6);
            });
          },
      11: (t) => { // Crash
            const { src, gain: g } = noise(1.0, 'highpass', 5000, 0.3);
            g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
            src.start(t); src.stop(t + 1.0);
          },
      12: (t) => { // Clave
            const { osc: o, gain: g } = osc(1400, 'sine');
            env(g, 0.7, 0.025, t); o.start(t); o.stop(t + 0.03);
          },
      13: (t) => { // Snare B (deeper)
            const { src, gain: g } = noise(0.25, 'bandpass', 500, 0.6);
            env(g, 0.6, 0.22, t); g.gain.setValueAtTime(0.6, t); src.start(t); src.stop(t + 0.25);
            const { osc: o, gain: og } = osc(120); env(og, 0.5, 0.1, t); o.start(t); o.stop(t + 0.12);
          },
      14: (t) => { // Shaker
            const { src, gain: g } = noise(0.06, 'bandpass', 5000, 0.25);
            env(g, 0.25, 0.05, t); g.gain.setValueAtTime(0.25, t); src.start(t); src.stop(t + 0.06);
          },
      15: (t) => { // Synth perc
            const { osc: o, gain: g } = osc(440, 'triangle');
            o.frequency.setValueAtTime(660, t); o.frequency.exponentialRampToValueAtTime(220, t + 0.12);
            env(g, 0.6, 0.15, t); o.start(t); o.stop(t + 0.2);
          },
      16: (t) => { // Deep sub kick
            const { osc: o, gain: g } = osc(40);
            o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.2);
            env(g, 1.0, 0.5, t); o.start(t); o.stop(t + 0.55);
          },
    };

    function playSample(imgNum) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const fn = sounds[parseInt(imgNum)];
      if (fn) fn(audioCtx.currentTime);
    }

    // ── End audio ────────────────────────────────────────────────────

    function setBackground(imgNum) {
      if (imgNum === currentImg) return;
      currentImg = imgNum;

      playSample(imgNum);
    }

    // ── Infinite scroll setup ─────────────────────────────────────────
    // Layout: spacer | [top clones] | [real slides] | [bottom clones] | spacer
    // When centered on real-0, top-clones fill the visible area above.
    // When we scroll to bottom-clone-0 and instantly reset to real-0,
    // both positions look identical so the jump is invisible.
    const realCount   = slides.length;
    const startSpacer = container.querySelector('.slide-spacer:first-child');
    const endSpacer   = container.querySelector('.slide-spacer:last-child');

    // Prepend clones (inserted in reverse so order is preserved after first slide)
    [...slides].reverse().forEach(s => startSpacer.after(s.cloneNode(true)));
    // Append clones
    slides.forEach(s => endSpacer.before(s.cloneNode(true)));

    // DOM is now: spacer · [top×4] · [real×4] · [bottom×4] · spacer
    // Real slide 0 is at flat index realCount (= 4)

    // ── Tilt — applied to ALL slides including clones ─────────────────
    function update() {
      const allSlides   = Array.from(container.querySelectorAll('.slide'));
      const vh          = container.clientHeight;
      const centerY     = vh / 2;
      let   closest     = null;
      let   closestDist = Infinity;

      allSlides.forEach((slide, i) => {
        const rect        = slide.getBoundingClientRect();
        const slideCenter = rect.top + rect.height / 2;
        const absDist     = Math.abs(slideCenter - centerY);

        if (absDist < closestDist) { closestDist = absDist; closest = slide; }

        const t   = Math.min(absDist / (vh * 0.5), 1);
        const e   = t * t;
        const dir = i % 2 === 0 ? 1 : -1;
        slide.style.transform =
          `perspective(700px) rotateY(${e * 42 * dir}deg) scale(${1 + e})`;
      });

      if (closest) setBackground(closest.dataset.img);
    }

    container.addEventListener('scroll', () => requestAnimationFrame(update), { passive: true });
    update();

    // ── Block user scrolling ──────────────────────────────────────────
    container.addEventListener('wheel',     e => e.preventDefault(), { passive: false });
    container.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','Space','PageUp','PageDown'].includes(e.key)) e.preventDefault();
    });

    // ── Auto-scroll ───────────────────────────────────────────────────
    // autoIdx tracks DOM flat-index (realCount = real-0, realCount*2-1 = real-3,
    // realCount*2 = bottom-clone-0 which triggers reset back to real-0)
    let autoIdx = realCount; // start at real-0

    function slideH() { return slides[0].offsetHeight; }

    function scrollToIdx(i, smooth) {
      container.scrollTo({ top: slideH() * (i + 0.5), behavior: smooth ? 'smooth' : 'instant' });
    }

    function autoNext() {
      autoIdx++;
      scrollToIdx(autoIdx, true);

      if (autoIdx >= realCount * 2) {
        // Just scrolled to bottom-clone-0; wait for animation, then reset invisibly
        setTimeout(() => {
          autoIdx = realCount;
          scrollToIdx(autoIdx, false);
          setTimeout(autoNext, 2000);
        }, 700);
      } else {
        setTimeout(autoNext, 2000);
      }
    }

    scrollToIdx(realCount, false); // position at real-0 on load
    setTimeout(autoNext, 2000);
  </script>

</body>
</html>
