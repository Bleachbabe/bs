<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backslash – Entwürfe</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #c8c8c8;
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    }

    /* ── iframe fills everything above the tab bar ── */
    #stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100vh - 26px);
      border: none;
      display: block;
    }

    /* ── Tab bar — Excel-style ── */
    #tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 26px;
      background: #d4d4d4;
      display: flex;
      align-items: flex-end;
      border-top: 1px solid #a0a0a0;
      overflow-x: auto;
      scrollbar-width: none;
      padding-left: 4px;
      gap: 2px;
    }
    #tabs::-webkit-scrollbar { display: none; }

    #tabs button {
      flex: 0 0 auto;
      height: 22px;
      background: #bebebe;
      border: 1px solid #a0a0a0;
      border-bottom: none;
      border-radius: 3px 3px 0 0;
      color: #444;
      font-family: inherit;
      font-size: 11px;
      font-weight: 400;
      padding: 0 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s;
      outline: none;
    }

    #tabs button:hover {
      background: #cecece;
      color: #222;
    }

    #tabs button.active {
      background: #f0f0f0;
      color: #000;
      border-color: #a0a0a0;
      height: 24px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <iframe id="stage" src="" title="Preview"></iframe>

  <div id="tabs"></div>

  <script>
    const designs = [
      { label: 'bw',            file: 'index_bw.html' },
      { label: 'bw · smalltext',file: 'index_bw2_smalltext.html' },
      { label: 'bw · sound',    file: 'index_bw3_sound.html' },
      { label: 'bw · images',   file: 'index_bw4_images.html' },
      { label: 'color',         file: 'index_color.html' },
      { label: 'color · text',  file: 'index_color2_imagesandtext.html' },
      { label: 'color · text 2',file: 'index_color3_imagesandtext copy.html' },
      { label: 'color · menu',  file: 'index_color4_menu.html' },
      { label: 'color · hover', file: 'index_color5_hover.html' },
      { label: 'color · tilt',  file: 'index_color6_hover.html' },
      { label: 'landing',       file: 'index_landing.html' },
      { label: 'landing · rev', file: 'index_landing2_reverse.html' },
      { label: 'landing · rev2',file: 'index_landing3_reverse.html' },
      { label: 'landing · blocks',file:'index_landing4_blocks.html' },
      { label: 'landing · words',file:'index_landing5_words.html' },
      { label: 'landing · track',file:'index_landing6_track.html' },
      { label: 'landing · reverb',file:'index_landing7_track.html' },
      { label: 'landing · sound', file:'index_landing4_sound.html' },
      { label: 'landing · fx',    file:'index_landing6_sound.html' },
      { label: 'bs · roboto',     file:'BSTestRoboto.html' },
      { label: 'bs · roboto 2',   file:'BSTestRoboto2.html' },
      { label: 'romain · var',    file:'romainvariable.html' },
      { label: 'romain · fungi',  file:'romainfungi.html' },
    ];

    const stage   = document.getElementById('stage');
    const tabsEl  = document.getElementById('tabs');
    let   current = null;

    designs.forEach((d, i) => {
      const btn = document.createElement('button');
      btn.textContent = d.label;
      btn.addEventListener('click', () => activate(i));
      tabsEl.appendChild(btn);
    });

    function activate(i) {
      if (current === i) return;
      current = i;
      stage.src = designs[i].file;
      Array.from(tabsEl.children).forEach((b, j) => {
        b.classList.toggle('active', j === i);
      });
      // Scroll tab into view
      tabsEl.children[i].scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
    }

    // Load first tab on start
    activate(0);
  </script>

</body>
</html>
