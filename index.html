<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backslash – Entwürfe</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #c8c8c8;
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    }

    /* ── iframe fills everything above the tab bar ── */
    #stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100vh - 26px);
      border: none;
      display: block;
    }

    /* ── Tab bar — Excel-style ── */
    #tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 26px;
      background: #d4d4d4;
      display: flex;
      align-items: flex-end;
      border-top: 1px solid #a0a0a0;
      overflow-x: auto;
      scrollbar-width: none;
      padding-left: 4px;
      gap: 2px;
    }
    #tabs::-webkit-scrollbar { display: none; }

    /* ── Regular file tabs ── */
    #tabs button {
      flex: 0 0 auto;
      height: 22px;
      background: #bebebe;
      border: 1px solid #a0a0a0;
      border-bottom: none;
      border-radius: 3px 3px 0 0;
      color: #444;
      font-family: inherit;
      font-size: 13px;
      font-weight: 400;
      padding: 0 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s;
      outline: none;
    }

    #tabs button:hover {
      background: #cecece;
      color: #222;
    }

    #tabs button.active {
      background: #f0f0f0;
      color: #000;
      border-color: #a0a0a0;
      height: 24px;
      font-weight: 600;
    }

    /* ── Folder separator tabs ── */
    #tabs .folder {
      flex: 0 0 auto;
      height: 22px;
      background: #9a9a9a;
      border: 1px solid #808080;
      border-bottom: none;
      border-radius: 3px 3px 0 0;
      color: #f5f5f5;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0 10px;
      white-space: nowrap;
      cursor: default;
      user-select: none;
      /* small gap before/after folder tab */
      margin-left: 6px;
      margin-right: 2px;
    }
  </style>
</head>
<body>

  <iframe id="stage" src="" title="Preview"></iframe>

  <div id="tabs"></div>

  <script>
    // ─────────────────────────────────────────────
    // TAB DEFINITIONS
    // To add a new file:
    //   _f_ files → add to the firstDrafts array
    //   _n_ files → add to the newDrafts array
    // ─────────────────────────────────────────────

    const firstDrafts = [
      // ── bw ──
      { label: 'bw · 1',        file: 'index_f_bw_1.html' },
      { label: 'bw · 2',        file: 'index_f_bw_2.html' },
      { label: 'bw · 3',        file: 'index_f_bw_3.html' },
      { label: 'bw · 4',        file: 'index_f_bw_4.html' },
      // ── color ──
      { label: 'color · 1',     file: 'index_f_color_1.html' },
      { label: 'color · 2',     file: 'index_f_color_2.html' },
      { label: 'color · 3',     file: 'index_f_color_3.html' },
      { label: 'color · 4',     file: 'index_f_color_4.html' },
      { label: 'color · 5',     file: 'index_f_color_5.html' },
      { label: 'color · 6',     file: 'index_f_color_6.html' },
      { label: 'color · 7',     file: 'index_f_color_7.html' },
      // ── landing ──
      { label: 'landing · 1',   file: 'index_f_landing_1.html' },
      { label: 'landing · 2',   file: 'index_f_landing_2.html' },
      { label: 'landing · 3',   file: 'index_f_landing_3.html' },
      { label: 'landing · 4',   file: 'index_f_landing_4.html' },
      { label: 'landing · 5',   file: 'index_f_landing_5.html' },
      { label: 'landing · 6',   file: 'index_f_landing_6.html' },
      { label: 'landing · 7',   file: 'index_f_landing_7.html' },
      { label: 'landing · 8',   file: 'index_f_landing_8.html' },
      { label: 'landing · 9',   file: 'index_f_landing_9.html' },
      { label: 'landing · 10',  file: 'index_f_landing_10.html' },
      { label: 'landing · 11',  file: 'index_f_landing_11.html' },
      { label: 'landing · 12',  file: 'index_f_landing_12.html' },
      // ── roboto ──
      { label: 'roboto · 1',    file: 'index_f_bstestroboto_1.html' },
      { label: 'roboto · 2',    file: 'index_f_bstestroboto_2.html' },
      // ── romain ──
      { label: 'romain · 1',    file: 'index_f_romain_1.html' },
      { label: 'romain · 2',    file: 'index_f_romain_2.html' },
    ];

    const newDrafts = [
      { label: 'color · 1',     file: 'index_n_color_1.html' },
      { label: 'color · 2',     file: 'index_n_color_2.html' },
      { label: 'color · 3',     file: 'index_n_color_3.html' },
      { label: 'color · 4',     file: 'index_n_color_4.html' },
      { label: 'color · 5',     file: 'index_n_color_5.html' },

      { label: 'sound · 1',     file: 'index_n_sound_1.html' },
      { label: 'sound · 2',     file: 'index_n_sound_2.html' },
      { label: 'sound · 3',     file: 'index_n_sound_3.html' },
      { label: 'landing · 1',   file: 'index_n_landing_1.html' },

      { label: 'landing · 3',   file: 'index_n_landing_3.html' },
      { label: 'starting · 1',  file: 'index_n_starting_1.html' },
      { label: 'starting · 2',  file: 'index_n_starting_2.html' },
      { label: 'starting · 3',  file: 'index_n_starting_3.html' },
      { label: 'starting · 4',  file: 'index_n_starting_4.html' },
      { label: 'font · 1',      file: 'index_n_font_1.html' },
      { label: 'font · 2',      file: 'index_n_font_2.html' },
      { label: 'font · 3',      file: 'index_n_font_3.html' },
      { label: 'font · 4',      file: 'index_n_font_4.html' },
    ];

    // ─────────────────────────────────────────────
    // BUILD TABS
    // ─────────────────────────────────────────────
    const stage  = document.getElementById('stage');
    const tabsEl = document.getElementById('tabs');
    let current  = null;

    // Flat list of all clickable tabs (for activate() index)
    const allTabs = [];

    function addFolder(name) {
      const sep = document.createElement('span');
      sep.className = 'folder';
      sep.textContent = name;
      tabsEl.appendChild(sep);
    }

    function addTab(d) {
      const idx = allTabs.length;
      allTabs.push(d);
      const btn = document.createElement('button');
      btn.textContent = d.label;
      btn.dataset.idx = idx;
      btn.addEventListener('click', () => activate(idx));
      tabsEl.appendChild(btn);
    }

    // New Drafts group
    addFolder('📁 New Drafts');
    newDrafts.forEach(addTab);

    // First Drafts group
    addFolder('📁 First Drafts');
    firstDrafts.forEach(addTab);

    function activate(i) {
      if (current === i) return;
      current = i;
      stage.src = allTabs[i].file;
      tabsEl.querySelectorAll('button').forEach(b => {
        b.classList.toggle('active', +b.dataset.idx === i);
      });
      tabsEl.querySelector(`button[data-idx="${i}"]`)
        .scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
    }

    // Load first tab on start
    activate(0);
  </script>

</body>
</html>
