<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>BS 26</title>
        <meta name="description" content="">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            @font-face {
                font-family: "IBM Plex Sans Roman";
                src: url("https://s3-us-west-2.amazonaws.com/s.cdpn.io/85648/IBMPlexSansVar-Roman.ttf");
            }

            body {
                font-family: "IBM Plex Sans Roman", Times;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                min-height: 100vh;
                background-color: #c1cdca;
            }

            h1 {
                font-weight: 100;
                font-size: 10vw;
                color: blue;
                -webkit-text-stroke: 2pt greenyellow;
                -webkit-text-stroke-width: 8pt red;
                font-variation-settings: 'wght' 150, 'wdth' 100;
            }

            h1 span {
                display: inline-block;
                animation: breathe 4000ms infinite forwards;
            }

            @keyframes breathe {
                0% {
                    font-variation-settings: 'wght' 150, 'wdth' 100;
                    font-size: 10vw;
                    -webkit-text-stroke-width: 2pt greenyellow;
                    -webkit-text-stroke-width: 8pt red;
                }
                60% {
                    font-variation-settings: 'wght' 700, 'wdth' 85;
                    font-size: 10vw;
                    -webkit-text-stroke-width: 6pt greenyellow;
                    -webkit-text-stroke-width: 8pt red;
                }
                100% {
                    font-variation-settings: 'wght' 150, 'wdth' 100;
                    font-size: 10vw;
                    -webkit-text-stroke-width: 2pt greenyellow;
                    -webkit-text-stroke-width: 8pt red;
                }
            }

            h1 span:nth-of-type(1) { animation-delay: 0.4s; }
            h1 span:nth-of-type(2) { animation-delay: 0.8s; }
            h1 span:nth-of-type(3) { animation-delay: 1.2s; }
            h1 span:nth-of-type(4) { animation-delay: 1.6s; }
            h1 span:nth-of-type(5) { animation-delay: 2s; }
            h1 span:nth-of-type(6) { animation-delay: 2.4s; }
        </style>
    </head>
    <body>
        
                <h1>
                    <span> Arshi </span> <br>
                    <span>Anu Cato</span> <br>
                    <span>CCL</span> <br>
                    <span>Chienne De Garde</span> <br>
                    <span>Christian Coiffure</span> <br>
                    <span>djadjamai</span> <br>
                </h1>

        
    </body>
</html>
